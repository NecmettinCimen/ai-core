apiVersion: v1
kind: Service
metadata:
  name: ai-core-api-service
  namespace: ai-core
  labels:
    app: ai-core-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  - port: 443
    targetPort: 8081
    protocol: TCP
    name: https
  selector:
    app: ai-core-api

---
apiVersion: v1
kind: Service
metadata:
  name: ai-core-api-nodeport
  namespace: ai-core
  labels:
    app: ai-core-api
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30080
    protocol: TCP
    name: http
  - port: 443
    targetPort: 8081
    nodePort: 30443
    protocol: TCP
    name: https
  selector:
    app: ai-core-api

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-core-api-ingress
  namespace: ai-core
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - ai-core.example.com
    secretName: ai-core-api-tls
  rules:
  - host: ai-core.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-core-api-service
            port:
              number: 80
