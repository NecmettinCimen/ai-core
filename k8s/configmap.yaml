apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-core-config
  namespace: ai-core
  labels:
    app: ai-core-api
data:
  appsettings.json: |
    {
      "Logging": {
        "LogLevel": {
          "Default": "Information",
          "Microsoft.AspNetCore": "Warning"
        }
      },
      "AllowedHosts": "*",
      "AiSettings": {
        "Provider": "Ollama",
        "BaseUrl": "http://ollama-service:11434",
        "Model": "llama3",
        "Timeout": 30000
      },
      "CacheSettings": {
        "DefaultExpirationMinutes": 5
      },
      "ConnectionStrings": {
        "Redis": "redis-service:6379"
      }
    }
  redis-connection-string: "redis-service:6379"

---
apiVersion: v1
kind: Namespace
metadata:
  name: ai-core
  labels:
    name: ai-core
    environment: production
